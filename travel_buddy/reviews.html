<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Reviews</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(120deg, #e0eafc, #cfdef3 100%);
            margin: 0;
            color: #333;
        }
        .main-header {
            background: #232946;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .main-header .nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            height: 56px;
        }
        .main-header .brand {
            margin-right: auto;
            color: #fff;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 1px;
            text-decoration: none;
        }
        .main-header .nav-link {
            color: #fff;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 4px;
            margin-left: 10px;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
        }
        .main-header .nav-link:hover, .main-header .nav-link.active {
            background: #007bff;
            color: #fff;
        }
        .container {
            max-width: 600px;
            margin: 40px auto 0 auto;
            padding: 30px 20px;
            background: rgba(255,255,255,0.97);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 {
            color: #007bff;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        form {
            background: #f4f8fb;
            border-radius: 8px;
            padding: 20px 18px 10px 18px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            margin-bottom: 24px;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
            display: block;
        }
        input[type="number"], textarea {
            width: 100%;
            padding: 10px 12px;
            margin: 10px 0 18px 0;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
            background: #f8f9fa;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus, textarea:focus {
            border-color: #007bff;
            outline: none;
            background: #fff;
        }
        button {
            background-color: #007bff;
            color: white;
            font-size: 16px;
            padding: 10px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            font-weight: 600;
            margin-top: 8px;
        }
        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 2px 8px rgba(0,123,255,0.08);
        }
        .review-card {
            background: #f8f9fa;
            margin: 16px 0;
            padding: 18px 20px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
            font-size: 16px;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .review-card:hover {
            background: #e9f2ff;
            box-shadow: 0 2px 8px rgba(0,123,255,0.07);
        }
        @media (max-width: 700px) {
            .container {
                padding: 10px;
            }
            h1 {
                font-size: 24px;
            }
            .main-header .nav {
                flex-direction: column;
                height: auto;
                padding: 10px 0;
            }
            .main-header .brand {
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="nav">
            <a href="index.html" class="brand">Travel Buddy</a>
            <a href="index.html" class="nav-link">Home</a>
        </nav>
    </header>
    <div class="container">
        <h1>User Reviews</h1>
        <form action="submit_review.php" method="POST">
            <input type="hidden" name="reviewed_user_id" value="2"> <!-- Change as needed -->
            <label>Rating:
                <input type="number" name="rating" min="1" max="5" required>
            </label>
            <label>Comments:
                <textarea name="comments" required></textarea>
            </label>
            <button type="submit">Submit Review</button>
        </form>
        <div id="reviews-list"></div>
    </div>
    <script>
        fetch('fetch_reviews.php?reviewed_user_id=2')
            .then(response => response.json())
            .then(data => {
                let reviewsList = document.getElementById('reviews-list');
                if (data.length === 0) {
                    reviewsList.innerHTML = '<div class="alert alert-info">No reviews yet.</div>';
                    return;
                }
                reviewsList.innerHTML = data.map(review =>
                    `<div class="review-card">
                        <strong>${review.username}</strong> rated <strong>${review.rating}/5</strong>
                        <div style="margin-top:8px;">${review.comments}</div>
                    </div>`
                ).join('');
            });
    </script>
</body>
</html>
