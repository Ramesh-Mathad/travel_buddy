<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
       body {
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background-image: url(travelbuddy-login.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    color: #222;
    /* overflow: hidden; */ /* Remove or comment out this line */
}
        /* Glassmorphism Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.45);
            z-index: 1;
            backdrop-filter: blur(2px);
        }
        header {
             background: rgba(0,0,0,0.85);
             padding: 18px 0 12px 0;
             position: sticky;
             top: 0;
             z-index: 10;
             box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            
        }
        .brand {
            color: #007bff;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-left: 32px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
            text-decoration: none;
        }
        header nav ul {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0 32px 0 0;
        }
        header nav ul li {
            margin: 0 18px;
        }
        header nav ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.25s, color 0.25s;
        }
        header nav ul li a:hover {
            background: #ff9800;
            color: #232946;
        }
        .register-form {
            position: relative;
            z-index: 2;
            max-width: 400px;
            margin: 80px auto 0 auto;
            padding: 36px 28px 28px 28px;
            background: rgba(255,255,255,0.18);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            backdrop-filter: blur(8px);
            text-align: center;
            border: 1.5px solid rgba(255,255,255,0.25);
        }
        .register-form h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #007bff;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,123,255,0.07);
        }
        .register-form input[type="text"],
        .register-form input[type="email"],
        .register-form input[type="password"] {
            width: 100%;
            padding: 13px;
            margin: 12px 0;
            border: 1.5px solid #b2bec3;
            border-radius: 7px;
            box-sizing: border-box;
            font-size: 16px;
            color: #232946;
            background: rgba(255,255,255,0.7);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .register-form input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,123,255,0.09);
            background: #fff;
        }
        .register-form button {
            width: 100%;
            padding: 13px;
            margin-top: 18px;
            background: linear-gradient(90deg, #007bff 60%, #ff9800 100%);
            color: #fff;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 12px rgba(162, 166, 170, 0.08);
            transition: background 0.3s, transform 0.18s;
            position: relative;
            overflow: hidden;
        }
        .register-form button:hover {
            background: linear-gradient(90deg, #0056b3 60%, #ff9800 100%);
            transform: translateY(-2px) scale(1.03);
        }
        .register-form .login-link {
            margin-top: 18px;
            text-align: center;
            font-size: 15px;
            color: #b3b3b3;
        }
        .register-form .login-link a {
            color: #ff9800;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }
        .register-form .login-link a:hover {
            text-decoration: underline;
            color: #007bff;
        }
        @media (max-width: 600px) {
            .register-form {
                margin: 40px 8px 0 8px;
                padding: 22px 8px 18px 8px;
            }
            .brand {
                font-size: 1.3rem;
                margin-left: 12px;
            }
            header nav ul {
                padding: 0 8px 0 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand">Travel Buddy</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <div class="register-form">
        <h2>Register</h2>
        <form action="register.php" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <div class="login-link">
            Already a user? <a href="login.html">Log in</a>
        </div>
    </div>
</body>
</html>
