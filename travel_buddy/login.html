<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url(travelbuddy-login.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            color: #222;
           /* overflow: hidden; */
        
        }
        /* Glassmorphism Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.45);
            z-index: 1;
            backdrop-filter: blur(2px);
        }
        header {
            background: rgba(0,0,0,0.85);
            padding: 18px 0 12px 0;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .brand {
            color: #007bff ;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-left: 32px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
            text-decoration: none;
        }
        header nav ul {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0 32px 0 0;
        }
        header nav ul li {
            margin: 0 18px;
        }
        header nav ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.25s, color 0.25s;
        }
        header nav ul li a:hover {
            background: #007bff;
            color: #232946;
        }
        .login-container {
            position: relative;
            z-index: 2;
            max-width: 400px;
            margin: 80px auto 0 auto;
            padding: 36px 28px 28px 28px;
            background: rgba(255,255,255,0.18);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            backdrop-filter: blur(8px);
            text-align: center;
            border: 1.5px solid rgba(255,255,255,0.25);
        }
        .login-container h2 {
            margin-bottom: 24px;
            font-size: 2rem;
            font-weight: 700;
            color: #007bff;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,123,255,0.07);
        }
        .login-container input[type="email"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 13px;
            margin: 12px 0;
            border: 1.5px solid #b2bec3;
            border-radius: 7px;
            box-sizing: border-box;
            font-size: 16px;
            color: #232946;
            background: rgba(255,255,255,0.7);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-container input[type="email"]:focus,
        .login-container input[type="password"]:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,123,255,0.09);
            background: #fff;
        }
        .login-container button {
            width: 100%;
            padding: 13px;
            margin-top: 18px;
            background: linear-gradient(90deg, #007bff 60%, #ff9800 100%);
            color: #fff;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 12px rgba(0,123,255,0.08);
            transition: background 0.3s, transform 0.18s;
            position: relative;
            overflow: hidden;
        }
        .login-container button:hover {
            background: linear-gradient(90deg, #0056b3 60%, #ff9800 100%);
            transform: translateY(-2px) scale(1.03);
        }
        .login-container .register-link {
            margin-top: 20px;
            font-size: 1rem;
            color: #b3b3b3;
        }
        .login-container .register-link a {
            color: #0a6adf;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .login-container .register-link a:hover {
            color: #ff9800;
        }
        @media (max-width: 600px) {
            .login-container {
                margin: 40px 8px 0 8px;
                padding: 22px 8px 18px 8px;
            }
            .brand {
                font-size: 1.3rem;
                margin-left: 12px;
            }
            header nav ul {
                padding: 0 8px 0 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand">Travel Buddy</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>
    <div class="login-container">
        <form action="login.php" method="POST">
            <h2>Login</h2>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="register-link">
            New user? <a href="register.html">Register here</a>
        </div>
    </div>
</body>
</html>
